name: Daily Sign In

permissions:
  contents: write

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

concurrency:
  group: sign-in
  cancel-in-progress: true

jobs:
  sign-in:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            ffmpeg \
            fonts-wqy-zenhei \
            fonts-wqy-microhei \
            libxcb1 \
            libxkbcommon0 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libdrm2 \
            libgbm1 \
            libnss3 \
            libxcomposite1 \
            libxrandr2 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            libatk1.0-0 \
            libgtk-3-0

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 运行签到脚本
        env:
          SIGN_IN_USERNAME: ${{ secrets.SIGN_IN_USERNAME }}
          SIGN_IN_PASSWORD: ${{ secrets.SIGN_IN_PASSWORD }}
          HEADLESS: "False"
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 > xvfb.log 2>&1 &
          XVFB_PID=$!
          sleep 2

          ffmpeg -y -video_size 1280x720 -framerate 15 -f x11grab -i :99.0 \
            -pix_fmt yuv420p sign-in-recording.mp4 > ffmpeg.log 2>&1 &
          FFMPEG_PID=$!

          set +e
          python sign_in.py
          EXIT_CODE=$?
          set -e

          kill -INT $FFMPEG_PID || true
          wait $FFMPEG_PID || true

          kill $XVFB_PID || true
          wait $XVFB_PID || true

          echo "SIGN_EXIT_CODE=$EXIT_CODE" >> "$GITHUB_ENV"

      - name: 修改 cron（小时 +2，分钟随机 0~15）
        if: always()
        run: |
          python << 'EOF'
          import re
          import random
          from pathlib import Path

          workflow_path = Path(".github/workflows/sign-in.yml")
          text = workflow_path.read_text(encoding="utf-8")

          # 读取当前 cron
          m = re.search(r"cron:\s*'(\d+)\s+(\d+)\s+\*\s+\*\s+\*'", text)
          if not m:
              raise SystemExit("没有找到 cron")

          current_min = int(m.group(1))
          current_hour = int(m.group(2))

          # hour +2 循环
          next_hour = (current_hour + 2) % 24

          # minute 每次“重新生成”（不保存历史）
          next_min = random.randint(0, 15)

          new_cron = f"cron: '{next_min} {next_hour} * * *'"

          text = re.sub(
              r"cron:\s*'\d+\s+\d+\s+\*\s+\*\s+\*'",
              new_cron,
              text,
              count=1
          )

          workflow_path.write_text(text, encoding="utf-8")

          print(f"cron updated: {current_hour}:{current_min} -> {next_hour}:{next_min}")
          EOF

      - name: 提交新的 cron
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/sign-in.yml

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update cron schedule"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}"

      - name: 恢复签到结果
        if: always()
        run: |
          if [ "$SIGN_EXIT_CODE" != "0" ]; then
            echo "签到失败"
            exit "$SIGN_EXIT_CODE"
          fi

          echo "签到成功"
