permissions:
  contents: write

      - name: 修改下一次 cron 时间
        if: always()
        run: |
          python << 'EOF'
          import re
          from pathlib import Path

          workflow = Path(".github/workflows/daily-sign-in.yml")

          text = workflow.read_text(encoding="utf-8")

          m = re.search(r"cron:\s*'0\s+(\d+)\s+\*\s+\*\s+\*'", text)
          if not m:
              raise SystemExit("没有找到 cron")

          current = int(m.group(1))

          # UTC 每次 +2 小时
          next_hour = (current + 2) % 24

          text = re.sub(
              r"cron:\s*'0\s+\d+\s+\*\s+\*\s+\*'",
              f"cron: '0 {next_hour} * * *'",
              text,
              count=1
          )

          workflow.write_text(text, encoding="utf-8")

          print(f"{current} -> {next_hour}")
          EOF

      - name: 提交新的 cron
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/daily-sign-in.yml

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update cron schedule"

          git push
